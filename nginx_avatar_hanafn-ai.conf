# ========================================
# AvatarGenWebUI - avatar.hanafn-ai.com Nginx 설정
# ========================================
# 설치: ./setup_avatar_nginx.sh
# 파일 위치: /etc/nginx/sites-available/avatar.hanafn-ai.com
# ========================================
# 사전 요구사항:
#   1. DNS에 avatar.hanafn-ai.com A 레코드 추가 (hanafn-ai.com과 동일 IP)
#   2. SSL 인증서에 avatar.hanafn-ai.com 도메인 추가
#      sudo certbot certonly --nginx --expand -d hanafn-ai.com -d www.hanafn-ai.com -d avatar.hanafn-ai.com
# ========================================

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name avatar.hanafn-ai.com;

    # Let's Encrypt ACME Challenge (인증서 갱신용)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS - AvatarGenWebUI 프록시 (포트 8000)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name avatar.hanafn-ai.com;

    # SSL 인증서 (기존 hanafn-ai.com 인증서에 avatar 도메인 확장됨)
    ssl_certificate /etc/letsencrypt/live/hanafn-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hanafn-ai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 업로드/비디오 생성용 대용량·장시간 요청
    client_max_body_size 500M;
    client_body_buffer_size 128k;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;
    client_body_timeout 600s;
    client_header_timeout 600s;

    # AvatarGenWebUI (127.0.0.1:8000)로 프록시
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket 지원 (필요 시)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        proxy_buffering off;
        proxy_request_buffering off;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    access_log /var/log/nginx/avatar.hanafn-ai.com.access.log;
    error_log /var/log/nginx/avatar.hanafn-ai.com.error.log warn;
}
